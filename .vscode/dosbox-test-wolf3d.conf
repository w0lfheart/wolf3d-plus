# Wolf3D game test config

[render]
windowresolution = 1280x960
output = texture_nn
aspect = true

[cpu]
cputype  = 386_vm
cycles   = max

[mixer]
rate     = 44100

[speaker]
disabled = false

[autoexec]
mount C ~/dosbox # Directory for BC++ IDE
mount D ~/Documents/git/wolf3d-plus/WOLFSRC # Source code directory
C:
cls
copy D:\OBJ\WOLF3D.EXE C:\GAMES\WOLF3D\
cd GAMES\WOLF3D
WOLF3D.EXE
exit